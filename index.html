<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PE Deal Briefing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --black: #0a0a0a;
  --ink: #1a1a1a;
  --ink-2: #3d3d3d;
  --ink-3: #6b6b6b;
  --ink-4: #9b9b9b;
  --rule: #d4d4d4;
  --rule-light: #ebebeb;
  --bg: #fafaf8;
  --bg-2: #f4f3ef;
  --white: #ffffff;
  --accent: #b5132a;
  --accent-2: #1a3a6b;
  --gold: #c8963e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: "IBM Plex Sans", sans-serif; font-size: 14px; }

.header { background: var(--black); color: #fff; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--accent); }
.logo { font-family: "Playfair Display", serif; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; color: #fff; cursor: pointer; user-select: none; }
.logo:hover { color: #e5e5e5; }
.logo-wrap { display: flex; align-items: center; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn { padding: 6px 14px; border-radius: 2px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: "IBM Plex Sans", sans-serif; transition: all 0.12s; letter-spacing: 0.03em; }
.btn-primary { background: var(--accent-2); color: #fff; }
.btn-primary:hover { background: #14306b; }
.btn-outline { background: transparent; color: #aaa; border: 1px solid #444; }
.btn-outline:hover { background: #1a1a1a; color: #fff; }
.btn-danger { background: var(--accent); color: #fff; }
.btn-danger:hover { background: #9a0f22; }
.btn-success { background: #1a5c36; color: #fff; }
.btn-success:hover { background: #144a2b; }
.btn-edit-active { background: var(--gold); color: #fff; border: none; }
.btn-edit-active:hover { background: #b07d30; }

.tabs { background: var(--white); border-bottom: 1px solid var(--rule); padding: 0 40px; display: flex; }
.tab { padding: 12px 18px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--ink-3); border-bottom: 2px solid transparent; transition: all 0.12s; letter-spacing: 0.08em; text-transform: uppercase; font-family: "IBM Plex Sans", sans-serif; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--ink); }

.filter-bar { background: var(--bg-2); border-bottom: 1px solid var(--rule); padding: 10px 40px; display: flex; align-items: center; }
.search-input { padding: 8px 16px; border: 1px solid var(--rule); border-radius: 2px; font-size: 13px; outline: none; width: 100%; font-family: "IBM Plex Sans", sans-serif; background: var(--white); }
.search-input:focus { border-color: var(--accent-2); }

.main { padding: 28px 40px; max-width: 1080px; margin: 0 auto; }

.stats { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--rule); background: var(--white); }


.deal-card { background: var(--white); border: none; border-top: 1px solid var(--rule-light); border-left: 3px solid var(--accent-2); padding: 18px 20px 16px 20px; margin-bottom: 0; transition: background 0.12s; }
.deal-card:first-child { border-top: 1px solid var(--rule); }
.deal-card:hover { background: #f7f7f3; }
.deal-card.stage-close { border-left-color: #9b9b9b; }
.deal-card.stage-spa { border-left-color: #6d28d9; }
.deal-card.stage-exclusive { border-left-color: var(--accent); }
.deal-card.stage-bid { border-left-color: #c2410c; }
.deal-card.stage-prebid { border-left-color: #b45309; }
.deal-card.stage-dd { border-left-color: #166534; }
.deal-card.stage-advisor { border-left-color: #0e7490; }
.deal-card.stage-review { border-left-color: #9b9b9b; }

.deal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; gap: 16px; }
.deal-name { font-family: "Playfair Display", serif; font-size: 16px; font-weight: 700; color: var(--black); cursor: pointer; flex: 1; line-height: 1.3; }
.deal-name:hover { color: var(--accent); }
.deal-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-top: 3px; }
.stage-badge { padding: 2px 7px; border-radius: 1px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: "IBM Plex Mono", monospace; }
.deal-date { font-size: 10px; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; }
.deal-summary { font-size: 13px; color: var(--ink-2); line-height: 1.8; margin-bottom: 10px; cursor: pointer; }
.deal-articles { display: flex; flex-wrap: wrap; gap: 5px; }
.article-chip { padding: 2px 7px; background: var(--bg-2); border-radius: 1px; font-size: 10px; color: var(--accent-2); text-decoration: none; border: 1px solid var(--rule); font-family: "IBM Plex Mono", monospace; }
.article-chip:hover { background: #e8eef7; border-color: var(--accent-2); }
.rep-article { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.rep-article a { font-size: 12px; color: var(--accent-2); text-decoration: none; font-weight: 500; }
.rep-article a:hover { color: var(--accent); text-decoration: underline; }
.source-badge { display: inline-block; padding: 1px 6px; font-size: 9px; font-weight: 700; font-family: "IBM Plex Mono", monospace; letter-spacing: 0.06em; border-radius: 1px; flex-shrink: 0; }
.source-badge.thebell { background: #0a2a5c; color: #fff; }
.source-badge.dealsite { background: #7c1a1a; color: #fff; }
.deal-checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent-2); flex-shrink: 0; margin-top: 3px; }
.gmail-count { display: inline-block; background: var(--accent); color: #fff; border-radius: 10px; font-size: 10px; padding: 1px 6px; margin-left: 4px; font-family: "IBM Plex Mono", monospace; }

.star-btn { background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; color: var(--rule); transition: color 0.12s; flex-shrink: 0; }
.star-btn.starred { color: var(--gold); }
.star-btn:hover { color: var(--gold); }

.date-group { margin-bottom: 36px; }
.date-header { font-size: 10px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0; padding: 8px 0 6px; border-top: 2px solid var(--black); font-family: "IBM Plex Mono", monospace; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
.modal { background: var(--white); border-radius: 0; max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 36px; box-shadow: 0 24px 80px rgba(0,0,0,0.25); border-top: 4px solid var(--accent); }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--rule); gap: 16px; }
.modal-title { font-family: "Playfair Display", serif; font-size: 22px; font-weight: 700; color: var(--black); line-height: 1.3; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--ink-3); line-height: 1; padding: 0; flex-shrink: 0; }
.modal-close:hover { color: var(--black); }
.modal-section { margin-bottom: 20px; }
.modal-section-title { font-size: 10px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; font-family: "IBM Plex Mono", monospace; }
.modal-summary { font-size: 14px; line-height: 1.85; color: var(--ink-2); background: var(--bg-2); padding: 16px; border-left: 3px solid var(--rule); }
.history-item { border-left: 2px solid var(--rule); padding-left: 14px; margin-bottom: 14px; }
.history-date { font-size: 10px; color: var(--ink-4); font-weight: 500; margin-bottom: 4px; font-family: "IBM Plex Mono", monospace; }
.history-stage { display: inline-block; margin-bottom: 6px; }
.history-summary { font-size: 13px; color: var(--ink-2); line-height: 1.75; }
.article-list { display: flex; flex-direction: column; gap: 0; }
.article-link { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--rule-light); }
.article-link a { font-size: 13px; color: var(--accent-2); text-decoration: none; flex: 1; }
.article-link a:hover { color: var(--accent); text-decoration: underline; }
.article-link-date { font-size: 10px; color: var(--ink-4); white-space: nowrap; font-family: "IBM Plex Mono", monospace; }
.article-star-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--rule); transition: color 0.12s; padding: 0; flex-shrink: 0; }
.article-star-btn.starred { color: var(--gold); }
.article-star-btn:hover { color: var(--gold); }
.modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--rule); }

.edit-form { display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 10px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; font-family: "IBM Plex Mono", monospace; }
.form-input { padding: 9px 12px; border: 1px solid var(--rule); border-radius: 0; font-size: 13px; outline: none; font-family: "IBM Plex Sans", sans-serif; }
.form-input:focus { border-color: var(--accent-2); }
.form-textarea { padding: 9px 12px; border: 1px solid var(--rule); border-radius: 0; font-size: 13px; outline: none; resize: vertical; min-height: 120px; font-family: "IBM Plex Sans", sans-serif; line-height: 1.7; }
.form-textarea:focus { border-color: var(--accent-2); }
.form-select { padding: 9px 12px; border: 1px solid var(--rule); border-radius: 0; font-size: 13px; outline: none; background: var(--white); font-family: "IBM Plex Sans", sans-serif; }
.form-select:focus { border-color: var(--accent-2); }

.badge-review   { background: #f5f5f5; color: #6b6b6b; }
.badge-advisor  { background: #e0f2fe; color: #0369a1; }
.badge-prebid   { background: #fef9c3; color: #854d0e; }
.badge-bid      { background: #fff7ed; color: #9a3412; }
.badge-dd       { background: #f0fdf4; color: #166534; }
.badge-exclusive{ background: #fff1f2; color: #9f1239; }
.badge-spa      { background: #f5f3ff; color: #5b21b6; }
.badge-close    { background: #f5f5f5; color: #404040; }
.badge-etc      { background: #f5f5f5; color: #6b6b6b; }

.empty { text-align: center; padding: 80px 20px; color: var(--ink-4); }
.empty-icon { font-size: 40px; margin-bottom: 16px; }
.empty-text { font-family: "Playfair Display", serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--ink-2); }
.empty-sub { font-size: 12px; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; }

.gmail-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: transparent; color: #aaa; border-radius: 2px; border: 1px solid #444; cursor: pointer; font-size: 12px; font-weight: 600; font-family: "IBM Plex Sans", sans-serif; letter-spacing: 0.03em; }
.gmail-btn:hover { background: #1a1a1a; color: #fff; }

.scrap-section-title { font-size: 10px; font-weight: 600; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; margin: 24px 0 0; padding: 8px 0 6px; border-top: 2px solid var(--black); font-family: "IBM Plex Mono", monospace; }

/* ── News Run 아카이브 ──────────────────────────────────── */
.newsrun-item { background: var(--white); border: 1px solid var(--rule-light); border-left: 3px solid var(--accent); margin-bottom: 12px; }
.newsrun-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--rule-light); }
.newsrun-header:hover { background: var(--bg-2); }
.newsrun-subject { font-family: "Playfair Display", serif; font-size: 15px; font-weight: 700; color: var(--black); }
.newsrun-meta { font-size: 10px; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.newsrun-count { background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-family: "IBM Plex Mono", monospace; }
.newsrun-body { padding: 16px 18px; display: none; }
.newsrun-body.open { display: block; }
.newsrun-deal { padding: 10px 0; border-bottom: 1px solid var(--rule-light); }
.newsrun-deal:last-child { border-bottom: none; }
.newsrun-deal-name { font-weight: 600; font-size: 13px; color: var(--black); margin-bottom: 4px; }
.newsrun-deal-summary { font-size: 12px; color: var(--ink-2); line-height: 1.7; margin-bottom: 4px; }
.newsrun-deal-link { font-size: 11px; color: var(--accent-2); text-decoration: none; font-family: "IBM Plex Mono", monospace; }
.newsrun-deal-link:hover { text-decoration: underline; }
.newsrun-add-btn { margin: 0 0 20px; }
.newsrun-form { background: var(--white); border: 1px solid var(--rule); padding: 20px; margin-bottom: 20px; }
.newsrun-form-title { font-family: "Playfair Display", serif; font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--black); }
.newsrun-deals-input { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
.newsrun-deal-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; align-items: start; }
.newsrun-deal-row input, .newsrun-deal-row textarea { padding: 7px 10px; border: 1px solid var(--rule); font-size: 12px; font-family: "IBM Plex Sans", sans-serif; outline: none; width: 100%; }
.newsrun-deal-row input:focus, .newsrun-deal-row textarea:focus { border-color: var(--accent-2); }
.newsrun-deal-row textarea { resize: vertical; min-height: 56px; }
.newsrun-row-del { background: none; border: none; color: var(--ink-4); cursor: pointer; font-size: 16px; padding: 6px; align-self: center; }
.newsrun-row-del:hover { color: var(--accent); }

/* ── 칸반 보드 ───────────────────────────────────────────── */
.kanban-wrap { overflow-x: auto; padding: 24px 40px 40px; }
.kanban-board { display: flex; gap: 14px; min-width: max-content; align-items: flex-start; }
.kanban-col { width: 240px; flex-shrink: 0; }
.kanban-col-header { padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-family: "IBM Plex Mono", monospace; border-radius: 2px 2px 0 0; display: flex; justify-content: space-between; align-items: center; }
.kanban-col-count { font-size: 11px; font-weight: 700; font-family: "IBM Plex Mono", monospace; }
.kanban-col-body { display: flex; flex-direction: column; gap: 8px; padding: 10px 0 0; min-height: 60px; }
.kanban-card { background: var(--white); border: 1px solid var(--rule-light); border-left: 3px solid var(--rule); border-radius: 2px; padding: 12px 14px; cursor: pointer; transition: box-shadow 0.12s, transform 0.1s; }
.kanban-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-1px); }
.kanban-card-name { font-family: "Playfair Display", serif; font-size: 13px; font-weight: 700; color: var(--black); line-height: 1.35; margin-bottom: 6px; }
.kanban-card-summary { font-size: 11px; color: var(--ink-3); line-height: 1.6; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.kanban-card-footer { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.kanban-card-date { font-size: 10px; color: var(--ink-4); font-family: "IBM Plex Mono", monospace; }
.kanban-card-star { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--rule); transition: color 0.12s; padding: 0; line-height: 1; }
.kanban-card-star.starred { color: var(--gold); }
.kanban-card-star:hover { color: var(--gold); }
/* 컬럼별 카드 좌측 컬러 */
.kanban-card.stage-review   { border-left-color: #9b9b9b; }
.kanban-card.stage-advisor  { border-left-color: #0e7490; }
.kanban-card.stage-prebid   { border-left-color: #b45309; }
.kanban-card.stage-bid      { border-left-color: #c2410c; }
.kanban-card.stage-exclusive{ border-left-color: var(--accent); }
.kanban-card.stage-dd       { border-left-color: #166534; }
.kanban-card.stage-spa      { border-left-color: #6d28d9; }
.kanban-card.stage-close    { border-left-color: #9b9b9b; opacity: 0.75; }
/* 컬럼 헤더 배경 */
.kh-review   { background: #f5f5f5; color: #6b6b6b; }
.kh-advisor  { background: #e0f2fe; color: #0369a1; }
.kh-prebid   { background: #fef9c3; color: #854d0e; }
.kh-bid      { background: #fff7ed; color: #9a3412; }
.kh-exclusive{ background: #fff1f2; color: #9f1239; }
.kh-dd       { background: #f0fdf4; color: #166534; }
.kh-spa      { background: #f5f3ff; color: #5b21b6; }
.kh-close    { background: #f5f5f5; color: #404040; }
.kh-etc      { background: #f5f5f5; color: #6b6b6b; }

</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="location.reload()">PE Deal Briefing</div>
  <div class="header-right">
    <button class="gmail-btn" onclick="sendGmail()">📧 Gmail 발송<span class="gmail-count" id="gmailCount" style="display:none">0</span></button>
    <button class="btn btn-danger" id="deleteCheckedBtn" onclick="deleteChecked()" style="display:none">🗑️ 선택 삭제 <span id="deleteCount"></span></button>
    <button class="btn btn-outline" id="editModeBtn" onclick="toggleEditMode()">✏️ 편집 모드</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-date" onclick="switchTab('date')">날짜별 보기</div>
  <div class="tab" id="tab-deal" onclick="switchTab('deal')">딜별 보기</div>
  <div class="tab" id="tab-scrap" onclick="switchTab('scrap')">&#11088; 스크랩</div>
  <div class="tab" id="tab-newsrun" onclick="switchTab('newsrun')">📬 발송한 News Run</div>
</div>

<div class="filter-bar" id="filterBar">
  <input class="search-input" type="text" placeholder="&#128269; 딜명 검색..." id="searchInput" oninput="renderDeals()"/>
</div>

<div class="main">
  <div id="dealView" style="display:none"><div class="kanban-wrap"><div class="kanban-board" id="kanbanBoard"></div></div></div>
  <div id="dateView"></div>
  <div id="scrapView" style="display:none"></div>
  <div id="newsrunView" style="display:none"></div>
</div>

<div class="modal-overlay" id="dealModal" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeDealModal()">&#215;</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
let deals = [];

let lastUpdated = "";
let currentTab = "date";


let isEditMode = false;
let currentDealId = null;

let checkedDeals = new Set();
let scrappedDeals = new Set(JSON.parse(localStorage.getItem("scrappedDeals") || "[]"));
let scrappedArticles = new Set(JSON.parse(localStorage.getItem("scrappedArticles") || "[]"));

function saveScraps() {
  localStorage.setItem("scrappedDeals", JSON.stringify([...scrappedDeals]));
  localStorage.setItem("scrappedArticles", JSON.stringify([...scrappedArticles]));
}

const GH_REPO = "eenw23-code/pe-briefing";
const GH_FILE = "deals.json";
let GH_TOKEN = localStorage.getItem("gh_token") || "";

function getToken() {
  if (GH_TOKEN) return GH_TOKEN;
  const t = prompt("GitHub Personal Access Token을 입력하세요:\n(한 번만 입력하면 이후 자동 사용됩니다)");
  if (t) { GH_TOKEN = t.trim(); localStorage.setItem("gh_token", GH_TOKEN); }
  return GH_TOKEN;
}

async function loadData() {
  try {
    const res = await fetch("deals.json?t=" + Date.now());
    const data = await res.json();
    deals = data.deals || [];
    lastUpdated = data.lastUpdated || "";
    renderAll();
  } catch(e) { deals = []; renderAll(); }
}

function goHome() {
  document.getElementById("searchInput").value = "";
  switchTab("date");
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  const btn = document.getElementById("editModeBtn");
  btn.textContent = isEditMode ? "✏️ 편집 ON" : "✏️ 편집 모드";
  btn.className = isEditMode ? "btn btn-edit-active" : "btn btn-outline";
  if (currentDealId) openDeal(currentDealId);
}

function switchTab(tab) {
  currentTab = tab;
  ["deal","date","scrap","newsrun"].forEach(t => {
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
    document.getElementById(t+"View").style.display = t === tab ? "" : "none";
  });
  document.getElementById("filterBar").style.display = (tab === "scrap" || tab === "deal" || tab === "newsrun") ? "none" : "";
  if (tab === "newsrun") renderNewsRun();
  else renderDeals();
}


function getFilteredDeals() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  return deals.filter(d => {
    return !q || d.name.toLowerCase().includes(q) || (d.summary||"").toLowerCase().includes(q);
  });
}

const STAGE_STYLE = {
  "매각 검토중":     { badge: "badge-review",    card: "stage-review" },
  "주관사 선정":     { badge: "badge-advisor",   card: "stage-advisor" },
  "예비입찰":        { badge: "badge-prebid",    card: "stage-prebid" },

function stageCardClass(stage) { return (STAGE_STYLE[stage] || {}).card || ""; }

function getSourceBadge(source) {
  if (!source) return "";
  var s = (source || "").toLowerCase();
  if (s.indexOf("thebell") >= 0 || s.indexOf("더벨") >= 0) return '<span class="source-badge thebell">THE BELL</span>';
  if (s.indexOf("dealsite") >= 0 || s.indexOf("딜사이트") >= 0) return '<span class="source-badge dealsite">DEALSITE</span>';
  return "";
}

function renderDeals() {

function renderDateView(filtered) {
  const el = document.getElementById("dateView");
  const byDate = {};
  filtered.forEach(deal => {
    (deal.articles || []).forEach(art => {
      const d = (art.date || "날짜 미상").slice(0, 10);

      if (!byDate[d].find(x => x.id === deal.id)) byDate[d].push(deal);
    });
  });
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

function renderScrapView() {
  const el = document.getElementById("scrapView");
  const scrappedDealList = deals.filter(d => scrappedDeals.has(d.id));
  const scrappedArtList = [];
  deals.forEach(d => {
    (d.articles || []).forEach(a => {
      if (scrappedArticles.has(a.link)) scrappedArtList.push({ deal: d, article: a });
    });
  });
  if (!scrappedDealList.length && !scrappedArtList.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">스크랩한 항목이 없습니다</div><div class="empty-sub">딜 카드나 기사의 ★ 버튼으로 스크랩하세요</div></div>';
    return;
  }

    html += '<div class="scrap-section-title">⭐ 스크랩한 딜 (' + scrappedDealList.length + ')</div>';
    html += scrappedDealList.map(renderDealCard).join("");

function toggleDealScrap(id, e) {
  e.stopPropagation();
  if (scrappedDeals.has(id)) {
    scrappedDeals.delete(id);
  } else {
    scrappedDeals.add(id);
  }
  // deals.json에도 scrapped 필드 저장
  const deal = deals.find(d => d.id === id);
  if (deal) {
    deal.scrapped = scrappedDeals.has(id);
    saveToFile();
  }
  saveScraps();
  renderDeals();
}

function toggleArticleScrap(link, e) {
  if (e) e.stopPropagation();
  if (scrappedArticles.has(link)) scrappedArticles.delete(link);
  else scrappedArticles.add(link);
  saveScraps();
  renderDeals();
}

function openDeal(id) {
  const deal = deals.find(d => d.id === id);
  if (!deal) return;
  currentDealId = id;
  document.getElementById("modalTitle").textContent = deal.name;
  document.getElementById("dealModal").style.display = "flex";

  const history = (deal.history || []).slice().reverse();
  const histHtml = history.map(h =>
    '<div class="history-item"><div class="history-date">' + h.date + '</div>' +
    '<div class="history-stage">' + stageBadgeHtml(h.stage) + '</div>' +
    '<div class="history-summary">' + (h.summary||"") + '</div></div>'
  ).join("");

  const articles = (deal.articles || []).slice().sort((a, b) => {
    const priority = link => {
      if (!link) return 3;
      if (link.includes("thebell.co.kr")) return 0;
      if (link.includes("dealsite.co.kr")) return 1;
      if (link.includes("investchosun.com")) return 2;
      return 3;
    };
    return priority(a.link) - priority(b.link);
  });
  const artHtml = articles.map(a => {
    const starred = scrappedArticles.has(a.link);
    return '<div class="article-link">' +
      '<button class="article-star-btn ' + (starred?"starred":"") + '" onclick="toggleArticleScrap(\'' + a.link + '\',event)">★</button>' +
      '<a href="' + a.link + '" target="_blank">' + a.title + '</a>' +
      '<span class="article-link-date">' + (a.date||"").slice(0,10) + '</span>' +
    '</div>';
  }).join("");

  document.getElementById("modalBody").innerHTML =
    '<div class="modal-section"><div class="modal-section-title">현재 단계</div>' + stageBadgeHtml(deal.stage) + '</div>' +
    '<div class="modal-section"><div class="modal-section-title">최신 요약</div><div class="modal-summary">' + (deal.summary||"-") + '</div></div>' +
    (history.length > 1 ? '<div class="modal-section"><div class="modal-section-title">업데이트 이력</div>' + histHtml + '</div>' : '') +
    '<div class="modal-section"><div class="modal-section-title">관련 기사 (' + articles.length + '건)</div>' +
    '<div class="article-list">' + (artHtml || "<span style='color:#94a3b8;font-size:13px'>없음</span>") + '</div></div>';

  const actions = document.getElementById("modalActions");
  if (isEditMode) {
    actions.innerHTML =
      '<button class="btn btn-primary" onclick="openEditForm(\'' + id + '\')">✏️ 편집</button>' +
      '<button class="btn btn-danger" onclick="confirmDelete(\'' + id + '\')">🗑️ 삭제</button>' +
      '<button class="btn btn-outline" style="color:#374151;border-color:#e5e7eb;margin-left:auto" onclick="closeDealModal()">닫기</button>';
  } else {
    actions.innerHTML = '<button class="btn btn-outline" style="color:#374151;border-color:#e5e7eb;margin-left:auto" onclick="closeDealModal()">닫기</button>';
  }
}

function openEditForm(id) {

function saveDeal(id) {
  const deal = deals.find(d => d.id === id);
  if (!deal) return;
  const newName = document.getElementById("editName").value.trim();
  const newStage = document.getElementById("editStage").value;
  const newSummary = document.getElementById("editSummary").value.trim();
  if (!newName) { alert("딜명을 입력해주세요."); return; }
  const today = new Date().toISOString().slice(0, 10);
  deal.name = newName; deal.stage = newStage; deal.summary = newSummary; deal.updatedAt = today;
  if (!deal.history) deal.history = [];
  deal.history.push({ date: today, stage: newStage, summary: newSummary });
  saveToFile();
  renderDeals();
  openDeal(id);
}

function deleteChecked() {
  var n = checkedDeals.size;
  if (!n) { alert("체크한 딜이 없습니다."); return; }
  if (!confirm(n + "건을 삭제하시겠습니까?")) return;
  deals = deals.filter(d => !checkedDeals.has(d.id));
  checkedDeals.clear();
  updateGmailCount();
  saveToFile();
  renderDeals();
}

function confirmDelete(id) {
  if (!confirm("이 딜을 삭제하시겠습니까?")) return;
  deals = deals.filter(d => d.id !== id);
  saveToFile();
  closeDealModal();
  renderDeals();
}

async function saveToFile() {
  const token = getToken();
  if (!token) { alert("토큰이 없어 저장할 수 없습니다."); return; }
  const data = { deals, lastUpdated };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  let sha = "";
  try {
    const r = await fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE, {
      headers: { Authorization: "token " + token, Accept: "application/vnd.github.v3+json" }
    });
    const info = await r.json();
    sha = info.sha || "";
  } catch(e) {}
  const res = await fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE, {
    method: "PUT",
    headers: { Authorization: "token " + token, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ message: "update: " + new Date().toISOString().slice(0,16), content: encoded, sha })
  });
  if (res.ok) { alert("저장 완료!"); setTimeout(loadData, 3000); }
  else { GH_TOKEN = ""; localStorage.removeItem("gh_token"); alert("저장 실패. 토큰을 확인해주세요."); }
}

function saveNewsRun(subject, selected) {
  var runs = JSON.parse(localStorage.getItem("newsRuns") || "[]");
  runs.unshift({
    subject: subject,
    date: new Date().toISOString().slice(0, 16).replace("T", " "),
    deals: selected.map(function(deal) {
      var rep = deal.repArticle
             || (deal.articles||[]).find(a => a.link && (a.link.includes("thebell.co.kr") || a.link.includes("dealsite.co.kr")))
             || (deal.articles||[])[0] || {};
      return { name: deal.name, summary: deal.summary || "", link: rep.link || "", date: (rep.date||"").slice(0,10) };
    })
  });
  localStorage.setItem("newsRuns", JSON.stringify(runs));
}

function submitNewsRunForm() {
  var dateVal = document.getElementById("nrDate").value;
  if (!dateVal) { alert("날짜를 입력해주세요."); return; }
  var dealsList = [];
  document.querySelectorAll("[id^='nrName-']").forEach(function(el) {
    var i = el.id.split("-")[1];
    var name = el.value.trim();
    if (!name) return;
    dealsList.push({
      name: name,
      summary: (document.getElementById("nrSummary-" + i)||{}).value || "",
      link: (document.getElementById("nrLink-" + i)||{}).value || "",
      date: dateVal
    });
  });
  if (!dealsList.length) { alert("딜을 하나 이상 입력해주세요."); return; }
  var yy = dateVal.slice(2,4), mm = dateVal.slice(5,7), dd = dateVal.slice(8,10);
  var subject = yy + "." + mm + "." + dd + " Daily News Run";
  var runs = JSON.parse(localStorage.getItem("newsRuns") || "[]");
  runs.push({ subject: subject, date: dateVal + " 00:00", deals: dealsList });
  runs.sort(function(a,b){ return b.date.localeCompare(a.date); });
  localStorage.setItem("newsRuns", JSON.stringify(runs));
  nrRowCount = 1;
  renderNewsRun();
}

function deleteNewsRun(e, i) {
  e.stopPropagation();
  if (!confirm("이 News Run을 삭제하시겠습니까?")) return;
  var runs = JSON.parse(localStorage.getItem("newsRuns") || "[]");
  runs.splice(i, 1);
  localStorage.setItem("newsRuns", JSON.stringify(runs));
  renderNewsRun();
}

function toggleNewsRun(i) {
  var body = document.getElementById("newsrun-body-" + i);
  if (body) body.classList.toggle("open");
}

function sendGmail() {
  var selected = deals.filter(function(d) { return checkedDeals.has(d.id); });
  if (!selected.length) { alert("체크한 딜이 없습니다."); return; }
  var briefing = "";
  selected.forEach(function(deal, i) {
    var rep = deal.repArticle
           || (deal.articles||[]).find(a => a.link && (a.link.includes("thebell.co.kr") || a.link.includes("dealsite.co.kr")))
           || (deal.articles||[])[0]
           || {};
    briefing += (i+1) + ". " + deal.name + "\n";
    briefing += ((rep.date||"").slice(0,10)) + "\n";
    briefing += (rep.link||"") + "\n";
    briefing += (deal.summary||"") + "\n";
    briefing += "\n";
  });
  var now = new Date();
  var yy = String(now.getFullYear()).slice(2);
  var mm = String(now.getMonth()+1).padStart(2,"0");
  var dd = String(now.getDate()).padStart(2,"0");
  var subject = yy + "." + mm + "." + dd + " Daily News Run";
  var body =
    "안녕하세요.\n\n" +
    "오늘자 주요 Deal 브리핑 드립니다.\n\n" +
    briefing +
    "이외 모든 딜은 아래 링크에서 확인 가능합니다.\n" +
    "https://eenw23-code.github.io/pe-briefing/\n\n" +
    "감사합니다.\n" +
    "최인우 드림.";
  saveNewsRun(subject, selected);
  navigator.clipboard.writeText(body).then(function() {
    alert("본문이 클립보드에 복사됐습니다.\nGmail에서 붙여넣기(Ctrl+V) 해주세요.");
    window.open("https://mail.google.com/mail/?view=cm&su=" + encodeURIComponent(subject), "_blank");
  }).catch(function() {
    window.open("https://mail.google.com/mail/?view=cm&su=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body.slice(0, 1500)), "_blank");
  });
}

loadData();
</script>
